name: Deploy Frontend to bos-map.github.io

# Pushes the built frontend to the bos-map/bos-map.github.io repo.
# Requires a secret BOSMap_DEPLOY_TOKEN (fine-grained PAT with Contents:write
# on bos-map/bos-map.github.io) to be set in this repo's settings.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build frontend and push to bos-map.github.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # Data is fetched from the pipeline repo at runtime
          VITE_DATA_BASE_URL: 'https://retttechsolutions.github.io/BOS-Map/'
          # Output to a temp folder, not docs/
          VITE_OUT_DIR: '../dist-frontend'
        run: npm run build

      - name: Push to bos-map/bos-map.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Personal access token with Contents:write on bos-map/bos-map.github.io
          personal_token: ${{ secrets.BOSMAP_DEPLOY_TOKEN }}
          external_repository: bos-map/bos-map.github.io
          publish_branch: main
          publish_dir: ./dist-frontend
          # Keep existing files (don't wipe the repo)
          keep_files: false
          commit_message: 'chore: deploy frontend from BOS-Map pipeline'

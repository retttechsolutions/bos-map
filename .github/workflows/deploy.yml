name: Deploy Data to GitHub Pages

# Deploys docs/ (GeoJSON data + static API) to retttechsolutions.github.io/BOS-Map/
# The frontend is deployed separately to bos-map.github.io via deploy-frontend-org.yml

on:
  push:
    branches: [main]
    paths:
      - 'docs/data/**'
      - 'docs/api/**'
      - 'docs/.nojekyll'
  workflow_run:
    workflows: [Data Pipeline]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy data files to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

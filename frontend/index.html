<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOS-Map – Integrierte Leitstellen Deutschland</title>
  <meta name="description"
        content="Interaktive Karte aller integrierten Leitstellen in Deutschland mit Funkgruppen und API." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 1fr;
      overflow: hidden;
      background: #f8f9fa;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #1d3557;
      color: #fff;
      z-index: 10;
      box-shadow: 0 2px 4px rgba(0,0,0,.25);
    }

    #toolbar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .03em;
      white-space: nowrap;
      margin-right: 0.5rem;
    }

    #search-wrapper {
      position: relative;
      flex: 1;
      max-width: 480px;
    }

    #search-input {
      width: 100%;
      padding: 0.4rem 0.75rem;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      outline: none;
    }

    #search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      list-style: none;
      max-height: 250px;
      overflow-y: auto;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      z-index: 100;
    }

    #search-results li {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.85rem;
      color: #212529;
      border-bottom: 1px solid #f1f3f5;
    }

    #search-results li:last-child { border-bottom: none; }
    #search-results li:hover { background: #e9ecef; }

    /* ── Map container ── */
    #map-wrapper {
      position: relative;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    /* ── Info panel ── */
    .info-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(380px, 100vw);
      background: #fff;
      box-shadow: -2px 0 12px rgba(0,0,0,.15);
      overflow-y: auto;
      z-index: 5;
      transition: transform 0.25s ease;
    }

    .info-panel--hidden { transform: translateX(100%); }

    .info-panel__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 1rem;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
    }

    .info-panel__name {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
    }

    .info-panel__close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: #6c757d;
      padding: 0.2rem;
      flex-shrink: 0;
    }

    .info-panel__body { padding: 1rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      margin: 0.15rem 0.15rem 0.5rem 0;
    }

    .info-panel__dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.3rem 0.75rem;
      font-size: 0.85rem;
      margin: 0.75rem 0;
    }

    .info-panel__dl dt { color: #6c757d; font-weight: 600; }
    .info-panel__dl dd { color: #212529; word-break: break-word; }
    .info-panel__dl code { font-size: 0.8rem; background: #f1f3f5; padding: 0.1rem 0.3rem; border-radius: 3px; }

    .info-panel__section-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin: 1rem 0 0.5rem;
      color: #1d3557;
    }

    .info-panel__no-data { font-size: 0.85rem; color: #6c757d; }

    .funkgruppen-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .funkgruppen-table th {
      text-align: left;
      padding: 0.3rem 0.4rem;
      background: #e9ecef;
      font-weight: 600;
      color: #495057;
    }

    .funkgruppen-table td {
      padding: 0.3rem 0.4rem;
      border-bottom: 1px solid #f1f3f5;
      vertical-align: top;
    }

    .funkgruppen-table code { font-size: 0.8rem; }

    .info-panel__links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      font-size: 0.85rem;
    }

    .info-panel__note {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #6c757d;
      font-style: italic;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .info-panel {
        top: auto;
        right: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 55vh;
        box-shadow: 0 -2px 12px rgba(0,0,0,.15);
        border-radius: 12px 12px 0 0;
      }
      .info-panel--hidden { transform: translateY(100%); }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>🗺 BOS-Map</h1>
    <div id="search-wrapper">
      <input
        id="search-input"
        type="search"
        placeholder="Adresse oder Ort suchen…"
        autocomplete="off"
        aria-label="Ort oder Adresse suchen"
      />
      <ul id="search-results" hidden role="listbox" aria-label="Suchergebnisse"></ul>
    </div>
  </div>

  <div id="map-wrapper">
    <div id="map"></div>
    <div id="info-panel" role="complementary" aria-label="Leitstellen-Details"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
